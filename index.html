<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hiếu &amp; Huyền — Đếm ngày</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF3EC;
    --rose:#C44B5E;
    --rose-deep:#9C2F45;
    --gold:#CFA15E;
    --plum:#352236;
    --plum-soft:#5B4759;
    --line:rgba(53,34,54,0.12);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{
    margin:0; padding:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 18% 12%, rgba(207,161,94,0.16), transparent 55%),
      radial-gradient(circle at 85% 85%, rgba(196,75,94,0.14), transparent 55%),
      var(--cream);
    color:var(--plum);
    font-family:'Be Vietnam Pro', sans-serif;
    overflow-x:hidden;
  }

  .wrap{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:48px 20px 64px;
  }

  /* signature: intertwined initials */
  .monogram{
    position:relative;
    width:120px; height:120px;
    margin-bottom:18px;
    display:flex; align-items:center; justify-content:center;
  }
  .monogram svg{ width:100%; height:100%; }
  .monogram .heart-pulse{
    animation:beat 2.4s ease-in-out infinite;
    transform-origin:center;
  }
  @keyframes beat{
    0%,100%{ transform:scale(1); }
    18%{ transform:scale(1.12); }
    32%{ transform:scale(0.98); }
    45%{ transform:scale(1.08); }
    60%{ transform:scale(1); }
  }

  .eyebrow{
    font-size:12px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--rose-deep);
    font-weight:600;
    margin-bottom:6px;
  }

  h1.names{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(34px, 9vw, 52px);
    margin:0 0 6px;
    text-align:center;
    color:var(--plum);
    letter-spacing:0.01em;
  }
  h1.names .amp{
    color:var(--rose);
    font-style:normal;
    padding:0 6px;
  }

  .target-date{
    font-size:14px;
    color:var(--plum-soft);
    margin-bottom:36px;
    text-align:center;
  }
  .target-date b{ color:var(--rose-deep); font-weight:600; }

  /* countdown */
  .countdown{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
    width:100%;
    max-width:420px;
    margin-bottom:14px;
  }
  .cd-cell{
    background:rgba(255,255,255,0.55);
    border:1px solid var(--line);
    border-radius:18px;
    padding:14px 4px 12px;
    text-align:center;
    backdrop-filter:blur(6px);
  }
  .cd-num{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:clamp(26px, 7vw, 36px);
    color:var(--rose-deep);
    line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .cd-label{
    margin-top:6px;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--plum-soft);
  }

  .progress-line{
    width:100%;
    max-width:420px;
    height:3px;
    border-radius:3px;
    background:rgba(53,34,54,0.08);
    overflow:hidden;
    margin-bottom:40px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--gold), var(--rose));
    width:0%;
    transition:width 1s linear;
  }

  /* daily caption card */
  .card{
    position:relative;
    width:100%;
    max-width:440px;
    background:#fff;
    border-radius:22px;
    padding:30px 26px 26px;
    box-shadow:0 18px 40px -18px rgba(156,47,69,0.28), 0 2px 8px rgba(53,34,54,0.06);
    border:1px solid var(--line);
  }
  .card::before{
    content:"";
    position:absolute;
    top:-1px; left:24px; right:24px;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .seal{
    width:34px; height:34px;
    border-radius:50%;
    background:linear-gradient(160deg, var(--rose), var(--rose-deep));
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 16px;
    box-shadow:0 4px 10px rgba(156,47,69,0.35);
  }
  .seal svg{ width:16px; height:16px; }

  .day-tag{
    text-align:center;
    font-size:11px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin-bottom:10px;
  }

  .caption{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(18px, 4.6vw, 21px);
    line-height:1.55;
    text-align:center;
    color:var(--plum);
    margin:0;
  }

  .signoff{
    text-align:center;
    margin-top:18px;
    font-size:12.5px;
    color:var(--plum-soft);
  }
  .signoff span{ color:var(--rose-deep); font-weight:600; }

  footer{
    margin-top:36px;
    font-size:11px;
    letter-spacing:0.08em;
    color:rgba(53,34,54,0.38);
    text-align:center;
  }

  .done-state h1.names{ margin-bottom:14px; }
  .done-msg{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:clamp(20px,5vw,26px);
    text-align:center;
    color:var(--rose-deep);
    margin-bottom:30px;
  }

  @media (prefers-reduced-motion: reduce){
    .heart-pulse{ animation:none; }
    .progress-fill{ transition:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="monogram">
    <svg viewBox="0 0 120 120" fill="none">
      <circle cx="60" cy="60" r="58" stroke="#CFA15E" stroke-width="1" opacity="0.35"/>
      <g class="heart-pulse">
        <path d="M60 88
                 C 30 66, 16 46, 24 30
                 C 30 18, 48 16, 60 32
                 C 72 16, 90 18, 96 30
                 C 104 46, 90 66, 60 88 Z"
              fill="#C44B5E" opacity="0.12"/>
      </g>
      <text x="40" y="70" font-family="Playfair Display, serif" font-size="34" font-style="italic" font-weight="600" fill="#9C2F45" text-anchor="middle">H</text>
      <text x="80" y="70" font-family="Playfair Display, serif" font-size="34" font-style="italic" font-weight="600" fill="#CFA15E" text-anchor="middle">H</text>
    </svg>
  </div>

  <div class="eyebrow">Hành trình yêu thương</div>
  <h1 class="names">Hiếu <span class="amp">&amp;</span> Huyền</h1>
  <div class="target-date">Đếm ngược đến <b>23:00, 10/07/2026</b></div>

  <div id="liveBlock">
    <div class="countdown">
      <div class="cd-cell"><div class="cd-num" id="dd">00</div><div class="cd-label">Ngày</div></div>
      <div class="cd-cell"><div class="cd-num" id="hh">00</div><div class="cd-label">Giờ</div></div>
      <div class="cd-cell"><div class="cd-num" id="mm">00</div><div class="cd-label">Phút</div></div>
      <div class="cd-cell"><div class="cd-num" id="ss">00</div><div class="cd-label">Giây</div></div>
    </div>
    <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div id="doneBlock" style="display:none;" class="done-state">
    <div class="done-msg">Khoảnh khắc đã đến rồi 💍</div>
  </div>

  <div class="card">
    <div class="seal">
      <svg viewBox="0 0 24 24" fill="#fff">
        <path d="M12 21s-7.5-4.7-10-9.3C0.3 8.1 2 4.5 5.6 4c2-0.3 3.8 0.7 4.9 2.3 1.1-1.6 2.9-2.6 4.9-2.3 3.6 0.5 5.3 4.1 3.6 7.7C19.5 16.3 12 21 12 21z"/>
      </svg>
    </div>
    <div class="day-tag" id="dayTag">Ngày yêu thương</div>
    <p class="caption" id="captionText">Đang tải lời nhắn hôm nay…</p>
    <div class="signoff">— với tất cả yêu thương, <span>H &amp; H</span></div>
  </div>

  <footer>được giữ gìn mỗi ngày, cho đến và sau ngày 10.07.2026</footer>
</div>

<script>
(function(){
  // Target: 23:00:00, 10 July 2026, local time
  var target = new Date(2026, 6, 10, 23, 0, 0);
  // Reference start point for progress bar (30 days before target, adjustable)
  var start = new Date(target.getTime() - 1000*60*60*24*60); // 60 days window for progress visual

  var captions = [
    "Mỗi ngày trôi qua là một ngày Huyền khiến trái tim Hiếu chắc chắn hơn về chữ \"mãi mãi\".",
    "Yêu Huyền không cần lý do, chỉ cần một cái nắm tay là Hiếu biết mình đang ở đúng nơi cần ở.",
    "Có những điều không cần nói ra, như cách Hiếu vẫn luôn chọn Huyền, mỗi sáng thức dậy.",
    "Huyền là lý do khiến những ngày bình thường nhất cũng trở thành kỷ niệm đáng nhớ.",
    "Tình yêu của Hiếu và Huyền không ồn ào, chỉ lặng lẽ lớn lên theo từng ngày bên nhau.",
    "Dù xa hay gần, trái tim Hiếu vẫn luôn hướng về một người duy nhất — Huyền.",
    "Có Huyền, những điều giản dị nhất cũng hoá thành hạnh phúc.",
    "Hiếu tin rằng định mệnh đã sắp đặt để hai người gặp nhau, đúng người, đúng thời điểm.",
    "Mỗi tin nhắn, mỗi cuộc gọi, đều là một mảnh ghép nhỏ cho câu chuyện tình của Hiếu và Huyền.",
    "Huyền không cần hoàn hảo, chỉ cần là Huyền — vậy là đủ để Hiếu yêu trọn vẹn.",
    "Ngày càng gần hơn đến cột mốc đặc biệt, lòng Hiếu càng thêm chắc chắn về Huyền.",
    "Có một người luôn khiến Hiếu muốn trở thành phiên bản tốt hơn mỗi ngày — đó là Huyền.",
    "Yêu thương không cần phải lớn lao, chỉ cần đều đặn như cách Hiếu vẫn nghĩ về Huyền mỗi ngày.",
    "Huyền là bến đỗ bình yên giữa những bộn bề của Hiếu.",
    "Một ngày không nói chuyện với Huyền là một ngày Hiếu thấy thiếu thiếu điều gì đó.",
    "Tình yêu này không vội vàng, chỉ chậm rãi và bền bỉ như chính hai con người tạo nên nó.",
    "Hiếu mong mỗi ngày trôi qua, khoảng cách đến hạnh phúc trọn vẹn lại ngắn thêm một chút.",
    "Có Huyền bên cạnh, mọi kế hoạch tương lai của Hiếu đều trở nên rõ ràng hơn.",
    "Huyền là người duy nhất khiến Hiếu vừa yên tâm, vừa háo hức về ngày mai.",
    "Không phải ngẫu nhiên mà hai người đến với nhau, đó là một hành trình đáng để trân trọng.",
    "Hiếu chọn Huyền hôm qua, hôm nay, và sẽ chọn lại vào ngày mai nữa.",
    "Tình yêu lớn lên không phải nhờ những điều to tát, mà từ những lần Hiếu và Huyền ở bên nhau.",
    "Huyền khiến Hiếu tin vào một tình yêu chân thành, không toan tính, không vội vã.",
    "Đếm từng ngày không phải vì sốt ruột, mà vì biết điều phía trước thật sự xứng đáng để chờ.",
    "Hiếu luôn nhớ Huyền theo những cách rất riêng — lúc làm việc, lúc nghỉ ngơi, lúc mơ về tương lai.",
    "Sự bình yên Hiếu cảm nhận được khi nghĩ về Huyền là điều không gì có thể thay thế.",
    "Mỗi ngày gần hơn cột mốc 10/7, là mỗi ngày Hiếu thêm trân trọng hành trình đã đi qua cùng Huyền.",
    "Huyền không chỉ là người yêu, mà còn là người bạn đồng hành đáng tin cậy nhất của Hiếu.",
    "Có những tình yêu được xây bằng sự kiên nhẫn và chân thành — tình yêu của Hiếu và Huyền là một trong số đó.",
    "Hiếu tin chắc rằng, dù ngày 10/7 có đến hay chưa, tình cảm dành cho Huyền vẫn sẽ luôn vẹn nguyên."
  ];

  function pad(n){ return n < 10 ? '0' + n : '' + n; }

  function dayIndexSinceEpoch(date){
    // local-day based index so it changes consistently at midnight local time
    var d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    return Math.floor(d.getTime() / 86400000);
  }

  function renderCaption(){
    var now = new Date();
    var idx = ((dayIndexSinceEpoch(now) % captions.length) + captions.length) % captions.length;
    document.getElementById('captionText').textContent = captions[idx];
    var dayNum = Math.max(0, Math.ceil((target - now) / 86400000));
    document.getElementById('dayTag').textContent =
      now >= target ? 'Đã đến ngày đặc biệt' : 'Còn ' + dayNum + ' ngày nữa — Lời nhắn hôm nay';
  }

  function tick(){
    var now = new Date();
    var diff = target - now;

    if(diff <= 0){
      document.getElementById('liveBlock').style.display = 'none';
      document.getElementById('doneBlock').style.display = 'block';
      renderCaption();
      return;
    }

    var totalSeconds = Math.floor(diff / 1000);
    var days = Math.floor(totalSeconds / 86400);
    var hours = Math.floor((totalSeconds % 86400) / 3600);
    var mins = Math.floor((totalSeconds % 3600) / 60);
    var secs = totalSeconds % 60;

    document.getElementById('dd').textContent = pad(days);
    document.getElementById('hh').textContent = pad(hours);
    document.getElementById('mm').textContent = pad(mins);
    document.getElementById('ss').textContent = pad(secs);

    var total = target - start;
    var elapsed = now - start;
    var pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
    document.getElementById('progressFill').style.width = pct + '%';
  }

  renderCaption();
  tick();
  setInterval(tick, 1000);

  // re-check caption at local midnight rollovers without full reload
  setInterval(renderCaption, 60 * 1000);
})();
</script>
</body>
</html>
